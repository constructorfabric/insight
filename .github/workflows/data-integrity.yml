name: data-integrity

# Static, warehouse-free guards on the dbt models. Blocking from day one — no
# service container needed, so there's no reason to let these regress.
on:
  pull_request:
    branches: [main]
    paths:
      - 'src/ingestion/**'
      - 'scripts/ci/nullable_key_audit.py'
      - 'scripts/ci/test_nullable_key_audit.py'
      - '.github/workflows/data-integrity.yml'
  workflow_dispatch:

jobs:
  nullable-key-guard:
    runs-on: ubuntu-latest
    steps:
      # SHA-pinned (supply-chain hardening, zizmor blanket-policy) + no token
      # persistence — this job only reads the tree.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      # A ReplacingMergeTree that dedups on a NULLABLE key never collapses its
      # duplicates (NULL != NULL) → drifting, double-counted metrics (#1330).
      - name: No dbt model may dedup on a nullable key
        run: python scripts/ci/nullable_key_audit.py --check
      - name: Self-test the guard's parser
        run: python -m pytest scripts/ci/test_nullable_key_audit.py -q
