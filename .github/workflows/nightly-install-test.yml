# Nightly fresh-install validation — MANDATORY for release candidacy.
#
# Implements the "Kubernetes and Docker installation validation" requirement:
# a chart version is not promotable to staging/production unless the latest
# nightly install run is green (enforced via the release checklist and the
# `production` GitHub Environment gate — see scripts/ci/enforce-quality-gates.sh).
#
# Runs the same tests/install/test-install.sh used for laptop verification
# (source of truth: QA install audit — 9 defects found by exactly this flow).

name: Nightly Install Test

on:
  schedule:
    - cron: "30 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  fresh-install-kind:
    name: fresh-install-kind
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Install kind
        run: |
          curl -sSLo kind https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          chmod +x kind && sudo mv kind /usr/local/bin/

      - uses: azure/setup-helm@fe7b79cd5ee1e45176fcad797de68ecaf3ca4814 # v4.2.0
        with:
          version: v3.14.0

      - name: Preflight deps (the audit's environment-trap fixes)
        run: |
          pip install --quiet 'pyyaml==6.0.2'
          docker info >/dev/null
          df -h /

      - name: Fresh install + BVT
        run: |
          ./tests/install/test-install.sh \
            --repo "$GITHUB_WORKSPACE" \
            --clean \
            --timeout 4500

      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl get pods -A -o wide || true
          kubectl get events -A --sort-by=.lastTimestamp | tail -50 || true
          kubectl -n insight describe pods | tail -200 || true

      - name: Upload install log
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: install-test-log
          path: /tmp/insight-install-test-*.log
          if-no-files-found: ignore
