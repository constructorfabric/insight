# Helm chart validation — MANDATORY, BLOCKING.
#
# Required status check on `main` (see scripts/ci/enforce-quality-gates.sh).
#
# Exists to make two real incident classes impossible to merge:
#   1. appVersion computed as "---" (fixed in #1303) — guarded by a strict
#      format check on every Chart.yaml.
#   2. Charts that lint/template only on the happy path — guarded by
#      `helm lint --strict` + a full `helm template` render of the umbrella.

name: Helm Validate

on:
  pull_request:
    branches: [main]
    paths:
      - "charts/**"
      - "src/backend/services/*/helm/**"
      - "src/frontend/helm/**"
      - "helmfile/charts/**"
      - ".github/workflows/helm-validate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  helm-validate:
    name: helm-validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Guard appVersion / version format in every Chart.yaml
        run: |
          set -euo pipefail
          rc=0
          while IFS= read -r chart; do
            app_version=$(yq -r '.appVersion // ""' "$chart")
            version=$(yq -r '.version // ""' "$chart")
            # version must be semver
            if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+].+)?$ ]]; then
              echo "::error file=$chart::invalid chart version '$version'"; rc=1
            fi
            # appVersion (when present) must be a build tag, semver, or dev placeholder
            if [[ -n "$app_version" ]] && \
               ! [[ "$app_version" =~ ^[0-9]{4}\.[0-9]{2}\.[0-9]{2}\.[0-9]{2}\.[0-9]{2}-[0-9a-f]{7}$ ]] && \
               ! [[ "$app_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-+].+)?$ ]]; then
              echo "::error file=$chart::invalid appVersion '$app_version' (the '---' bug class)"; rc=1
            fi
          done < <(git ls-files '*/Chart.yaml' 'Chart.yaml')
          exit $rc

      - name: Forbid :latest and empty image tags in chart values
        run: |
          set -euo pipefail
          rc=0
          while IFS= read -r f; do
            if grep -nE '(image:|tag:).*(:latest"?$|latest"?\s*$)' "$f" | grep -v '^\s*#'; then
              echo "::error file=$f::':latest' image reference in chart values (frontend blank-page defect class)"; rc=1
            fi
          done < <(git ls-files 'charts/**/values.yaml' 'src/**/helm/values.yaml')
          exit $rc

      - name: helm lint (strict) — umbrella and all local subcharts
        run: |
          set -euo pipefail
          helm dependency update charts/insight
          helm lint --strict charts/insight
          for c in src/backend/services/*/helm src/frontend/helm helmfile/charts/*; do
            [ -f "$c/Chart.yaml" ] && helm lint "$c"
          done

      - name: helm template — full render must succeed with default values
        run: |
          set -euo pipefail
          helm template insight charts/insight \
            --namespace insight \
            --set ingestion.reconcile.tenantId=ci-validate \
            > /tmp/rendered.yaml
          echo "rendered $(grep -c '^kind:' /tmp/rendered.yaml) objects"

      - name: kubeconform — rendered manifests must be valid Kubernetes
        run: |
          set -euo pipefail
          curl -sSL https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz | tar xz
          ./kubeconform -strict -ignore-missing-schemas -summary /tmp/rendered.yaml
