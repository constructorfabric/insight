name: data-quality

# Single home for the static, warehouse-free data gates that run on every
# ingestion PR. Consolidates what were three separate workflows
# (data-checks / data-integrity / data-contracts) into one checkout +
# parallel jobs, so an ingestion PR spins up one workflow, not three.
#
# Jobs:
#   connector-silver-coverage  — every bronze connector reaches a silver class  (blocking)
#   nullable-key-guard         — no dbt model dedups on a NULLABLE key (#1330)   (blocking)
#   dbt-coverage               — data-contract / test coverage report            (report-only)
#
# The warehouse-dependent audit (scripts/ci/data_presence_audit.py — gold-view
# resolution, dedup, presence, freshness) is intentionally NOT here: it is
# meaningful only against a populated warehouse (e2e rig for resolution+dedup;
# the deployed/nightly warehouse for presence+freshness). See that module's docstring.

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/ingestion/**'
      - 'scripts/ci/**'
      - '.github/workflows/data-quality.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Blocking from day one: a connector that reaches bronze but no silver:class_*
  # union renders blank dashboards. Known bronze-only connectors are waived
  # (ratchet — blocks NEW strandings); drop a name once its silver union lands.
  connector-silver-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.12'
      - name: Connector -> silver coverage
        run: python scripts/ci/connector_silver_coverage.py --check --waive ai/openai,task-tracking/youtrack,ui-design/figma

  # Blocking from day one (static, no warehouse): a ReplacingMergeTree that
  # dedups on a NULLABLE key never collapses its duplicates (NULL != NULL) →
  # drifting, double-counted metrics (#1330).
  nullable-key-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Lint & type-check the guard (ruff + mypy)
        run: |
          python -m pip install --quiet ruff==0.15.17 mypy==1.18.2
          ruff check scripts/ci/nullable_key_audit.py scripts/ci/test_nullable_key_audit.py
          ruff format --check scripts/ci/nullable_key_audit.py scripts/ci/test_nullable_key_audit.py
          mypy scripts/ci/nullable_key_audit.py
      - name: No dbt model may dedup on a nullable key
        run: python scripts/ci/nullable_key_audit.py
      - name: Self-test the guard's parser
        run: |
          python -m pip install --quiet pytest==8.3.4
          python -m pytest scripts/ci/test_nullable_key_audit.py -q

  # Report-only (informational): measures, on `dbt parse` (no warehouse), how
  # much of the metric path is under an enforced dbt contract + key tests and
  # how many bronze sources have a freshness check. Dev burns the debt down;
  # flip to `--check` per domain to make it blocking as coverage rises.
  dbt-coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.12'
      - name: Install dbt (core + clickhouse adapter)
        run: pip install --quiet 'dbt-core~=1.10' 'dbt-clickhouse~=1.9'
      - name: dbt parse (manifest only — no warehouse connection)
        working-directory: src/ingestion/dbt
        env:
          CLICKHOUSE_PASSWORD: ci-noconnect
          DBT_PROFILES_DIR: ${{ github.workspace }}/src/ingestion/dbt
        run: |
          if [ -f packages.yml ]; then dbt deps; fi
          dbt parse --no-version-check
      - name: Data-contract & test coverage report
        run: |
          python scripts/ci/dbt_coverage.py src/ingestion/dbt/target/manifest.json | tee /tmp/dbt-coverage.txt
          {
            echo '## dbt data-contract coverage'
            echo '```'
            grep -E 'metric-path models|enforced contract|key tests|^sources:|freshness declared' /tmp/dbt-coverage.txt || true
            echo '```'
            echo '_Report-only. Dev fills contracts; flip to `--check` per domain to enforce._'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage report + manifest
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: dbt-coverage
          path: |
            /tmp/dbt-coverage.txt
            src/ingestion/dbt/target/manifest.json
          if-no-files-found: warn
