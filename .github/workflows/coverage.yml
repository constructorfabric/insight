# Instrumented coverage — exact lines of code touched, UNIT and E2E SEPARATELY.
#
# Everything is compiled with -C instrument-coverage (LLVM source-based
# coverage via cargo-llvm-cov): the reports show per-line execution, not
# estimates. Two distinct profiles answer two distinct questions:
#   coverage-unit : which lines do the unit tests exercise?     (every PR)
#   coverage-e2e  : which lines does the real bronze→API flow
#                   exercise in the instrumented binaries?      (nightly)
# The delta between them is itself a signal: lines only e2e touches have no
# fast-feedback test; lines neither touches are the AI gap-analysis input
# (`make coverage-gaps`).
#
# Gate: COVERAGE_MIN_LINES is a RATCHET — set to the current measured baseline,
# only ever goes up (Phase 1.6). Same commands as `make coverage-unit/-e2e`.

name: Coverage

on:
  pull_request:
    branches: [main]
    paths: ["src/backend/**", ".github/workflows/coverage.yml"]
  schedule:
    - cron: "30 3 * * *"   # nightly: e2e instrumented profile
  workflow_dispatch:

permissions:
  contents: read

env:
  # Enforcing floor (measured workspace line-coverage was ~58.5% on 2026-06-13).
  # Set just below the baseline so it gates today and ratchets upward, never down.
  COVERAGE_MIN_LINES: "55"

jobs:
  coverage-unit:
    name: coverage-unit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (pinned 2026-06)
        with:
          toolchain: 1.95.0
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2.7.5
        with:
          workspaces: src/backend
      - uses: taiki-e/install-action@375e0c7f08a66b8c2ba7e7eef31a6f91043a81b0 # v2.44.38
        with:
          tool: cargo-llvm-cov
      - name: Validate coverage floor is enforcing
        run: |
          [[ "$COVERAGE_MIN_LINES" =~ ^[0-9]+$ ]] || { echo "::error::COVERAGE_MIN_LINES must be numeric"; exit 1; }
          (( COVERAGE_MIN_LINES > 0 )) || { echo "::error::COVERAGE_MIN_LINES must be > 0 to gate"; exit 1; }
      - name: Instrumented unit coverage (exact lines)
        working-directory: src/backend
        run: |
          cargo llvm-cov --all-features --workspace \
            --lcov --output-path target/coverage-unit.lcov \
            --fail-under-lines "$COVERAGE_MIN_LINES"
          cargo llvm-cov report --summary-only | tee -a "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: coverage-unit-lcov
          path: src/backend/target/coverage-unit.lcov
          if-no-files-found: error

  coverage-e2e:
    name: coverage-e2e
    # Heavy (instrumented build + full e2e rig): nightly + manual only.
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (pinned 2026-06)
        with:
          toolchain: 1.95.0
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2.7.5
        with:
          workspaces: src/backend
      - uses: taiki-e/install-action@375e0c7f08a66b8c2ba7e7eef31a6f91043a81b0 # v2.44.38
        with:
          tool: cargo-llvm-cov
      - name: Instrumented e2e coverage (separate profile)
        run: make coverage-e2e
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: coverage-e2e-lcov
          path: src/backend/target/coverage-e2e.lcov
          if-no-files-found: error
