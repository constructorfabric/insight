name: E2E — Bronze to API

# End-to-end transformation tests covering bronze → dbt → ClickHouse
# migration views → analytics-api HTTP response → CSV assert.
#
# Everything (Python, Rust, dbt, pytest) runs inside the runner image
# defined at src/ingestion/tests/e2e/compose/Dockerfile.runner. The same
# image is used for local development via src/ingestion/tests/e2e/e2e.sh.
#
# Specs: docs/domain/bronze-to-api-e2e/specs/
# Code:  src/ingestion/tests/e2e/

on:
  # PR-only — same reasoning as backend-checks: branch protection gates
  # merge on PR success, and re-running the full bronze→API stack
  # (clickhouse + mariadb + dbt + pytest) on the merge commit just burns
  # ~30 minutes for an outcome we already proved. workflow_dispatch
  # remains for manual reruns against main.
  #
  # Deliberately NO `paths:` filter: this check is meant to be a required
  # status check on main, and a path-filtered required check never reports
  # on PRs outside the filter — they hang on "Expected" forever. Running on
  # every PR keeps the gate uniform; the serial suite costs ~4 min with a
  # warm cargo cache.
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  # NB: forbids developers from running `pytest --update-snapshots` in CI.
  # The guard lives in src/ingestion/tests/e2e/fixtures/test_fixtures.py.
  CI: "true"

jobs:
  e2e:
    name: Run E2E suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: src/ingestion/tests/e2e

    steps:
      - uses: actions/checkout@v4

      # ─── Cache cargo target/ across runs ────────────────────────────────
      - name: Cache cargo target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            src/backend/target
          key: ${{ runner.os }}-cargo-e2e-${{ hashFiles('src/backend/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-e2e-

      # ─── Build / pull the runner image (BuildKit caches between PRs) ────
      - name: Build runner image
        run: ./e2e.sh build

      # ─── Pre-pull data plane images in parallel with whatever else ──────
      - name: Pre-pull ClickHouse + MariaDB
        run: |
          docker pull clickhouse/clickhouse-server:24.8.4.13 &
          docker pull mariadb:11.4.4 &
          wait

      # ─── Run the suite inside the runner ────────────────────────────────
      # Serial on purpose: the session rig is not xdist-safe yet (see
      # conftest.py — per-worker analytics-api spawns race SeaORM migrations
      # in the shared MariaDB, non-primary workers don't wait for ClickHouse
      # migrations, and the shared dbt target/ dir is deleted by whichever
      # worker finishes first). Wall-time cost is negligible: the image and
      # cargo builds dominate the job.
      - name: Run E2E suite
        run: ./e2e.sh test --tb=short -q

      # ─── Diagnostics on failure ─────────────────────────────────────────
      - name: Dump compose logs on failure
        if: failure()
        run: |
          echo "::group::clickhouse logs"
          ./e2e.sh logs clickhouse || true
          echo "::endgroup::"
          echo "::group::mariadb logs"
          ./e2e.sh logs mariadb || true
          echo "::endgroup::"

      - name: Tear down
        if: always()
        run: ./e2e.sh down || true

  # Instrumented e2e coverage — lives with the e2e rig (per review). Manual only
  # for now: the rig's instrumented-host-binary profraw capture is roadmap 2.15;
  # flip to a nightly `schedule` once that lands. Never a PR gate.
  coverage-e2e:
    name: coverage-e2e
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (pinned 2026-06)
        with:
          toolchain: 1.95.0
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2.7.5
        with:
          workspaces: src/backend
      - uses: taiki-e/install-action@375e0c7f08a66b8c2ba7e7eef31a6f91043a81b0 # v2.44.38
        with:
          tool: cargo-llvm-cov
      - name: Instrumented e2e coverage (separate profile)
        run: make coverage-e2e
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: coverage-e2e-lcov
          path: src/backend/target/coverage-e2e.lcov
          if-no-files-found: error

