name: data-checks

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/ingestion/**'
      - 'scripts/ci/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Static gate — no warehouse needed. Blocking from day one: every connector that
  # reaches bronze must be tagged into a silver:class_* union (else blank dashboards).
  connector-silver-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.11'
      - name: Connector -> silver coverage
        # Ratchet: blocks any NEW bronze-only connector, while waiving the
        # already-known ones so this gate can land. Each waiver is a tracked,
        # accepted gap (bronze ingests, no silver:class_* consumer yet):
        #   ai/openai              — usage/cost stream has no silver consumer (dead-end)
        #   task-tracking/youtrack — silver class_task_* projections not built yet (WIP)
        #   ui-design/figma        — staging exists, no silver class consumer yet
        # Remove a name from --waive once its silver:class_* union lands.
        run: python scripts/ci/connector_silver_coverage.py --check --waive ai/openai,task-tracking/youtrack,ui-design/figma

# NOTE: the warehouse-dependent audit (scripts/ci/data_presence_audit.py — gold-view
# resolution, silver dedup, presence, freshness) is intentionally NOT a job here.
# Those checks only mean anything against a *populated* warehouse, so a job spun up
# against a blank ClickHouse service would pass vacuously and prove nothing. The two
# real homes for it are:
#   - resolution + dedup → the e2e rig (e2e-bronze-to-api), which actually dbt-builds
#     bronze → silver before asserting;
#   - presence + freshness → the deployed/nightly warehouse, where "a source wrote 0
#     rows" / "newest row past SLA" is a true signal.
# See the module docstring in scripts/ci/data_presence_audit.py.
