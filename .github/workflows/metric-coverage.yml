name: Metric coverage

# Standalone metric-coverage gate: boots MariaDB + analytics-api, reads the
# metric universe from GET /v1/metrics, and fails if any enabled metric_id is
# neither tested by a metrics/*.test.yaml nor listed in SKIP_LIST
# (src/ingestion/tests/e2e/lib/metric_coverage.py). Independent of the e2e
# pytest suite — see scripts/ci/metric_coverage.sh.
#
# No `paths:` filter on purpose: this is meant to be a required status check,
# and a path-filtered required check never reports on PRs outside the filter
# (same reasoning as e2e-bronze-to-api.yml). The analytics-api build reuses
# build-images.yml's GHA layer cache, so most runs are a fast incremental compile.

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  metric-coverage:
    name: Metric coverage gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gate deps
        run: pip install pyyaml httpx

      - name: Run metric-coverage gate
        run: bash scripts/ci/metric_coverage.sh
        env:
          # Reuse the layer cache build-images.yml writes for analytics-api
          # (amd64 leg) → incremental compile instead of a cold build.
          BUILD_CACHE_FROM: type=gha,scope=analytics-api-amd64
