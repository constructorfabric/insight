# AI failure investigation — when a gate fails, the AI investigates with FULL
# context, because everything it needs is co-located in the repo:
#   tests + PRD + DESIGN + ADRs + schemas + code, per component
#   (docs/<unit>/specs/* and src/**/specs/*, registered in artifacts.toml).
#
# Trigger: any mandatory gate workflow finishing red on a PR branch.
# Output: an investigation comment on the PR — root-cause hypothesis, the
# spec section the failure violates (PRD/DESIGN traceability), suspect files,
# and a proposed fix or test. Advisory, never a gate: humans decide, AI digs.
#
# Requires: ANTHROPIC_API_KEY repo secret.

name: AI Investigate Failure

on:
  workflow_run:
    workflows:
      - "Backend Lint & Test"
      - "E2E — Bronze to API"
      - "Security Gates"
      - "Helm Validate"
      - "Docs Gates"
      - "Nightly Install Test"
      - "Release Train"
    types: [completed]

permissions:
  contents: read
  actions: read
  pull-requests: write
  issues: write

jobs:
  investigate:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Collect failing job logs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/failure
          gh run view ${{ github.event.workflow_run.id }} --repo "$GITHUB_REPOSITORY" \
            --log-failed > /tmp/failure/failed-jobs.log 2>/dev/null || \
            gh run view ${{ github.event.workflow_run.id }} --repo "$GITHUB_REPOSITORY" --log \
            | tail -800 > /tmp/failure/failed-jobs.log
          echo "workflow: ${{ github.event.workflow_run.name }}" > /tmp/failure/meta.txt
          echo "branch:   ${{ github.event.workflow_run.head_branch }}" >> /tmp/failure/meta.txt
          echo "sha:      ${{ github.event.workflow_run.head_sha }}" >> /tmp/failure/meta.txt

      - name: AI investigation (full co-located context)
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            A mandatory CI gate failed. Investigate the root cause using the
            full co-located context of this repository.

            Failure metadata: /tmp/failure/meta.txt
            Failing job logs: /tmp/failure/failed-jobs.log

            Method:
            1. Read the logs; identify the first real failure (not cascades).
            2. Locate the failing code/test/model. Read its CO-LOCATED specs:
               the component's specs/PRD.md, specs/DESIGN.md, specs/ADR/*,
               specs/schemas/* (see docs/DOCS_MAP.md and
               cypilot/config/artifacts.toml for the code↔spec mapping).
            3. Determine: is the code violating the spec, is the test wrong,
               or is the spec stale? Cite the exact PRD/DESIGN section.
            4. Identify suspect files/commits (git log on the touched paths).

            Then post ONE comment on the PR associated with branch
            ${{ github.event.workflow_run.head_branch }} (use `gh pr comment`)
            containing: ① root-cause hypothesis with confidence, ② the spec
            section it traces to, ③ suspect files with line refs, ④ a concrete
            proposed fix or failing-test reproduction, ⑤ what to check if the
            hypothesis is wrong. Be brief and factual. If no open PR exists
            for the branch, open an issue titled
            "CI failure investigation: ${{ github.event.workflow_run.name }}" instead.
          claude_args: "--allowedTools Bash,Read,Grep,Glob --max-turns 30"
