name: Backend Lint & Test

on:
  # PR-only: every change touching the backend must pass these checks before
  # it lands. Re-running the same suite on the merge commit just burns minutes
  # — the PR already proved the tree is green, and branch protection ensures
  # nothing reaches `main` without that PR. Use workflow_dispatch for an
  # explicit manual rerun against `main` (e.g. after a runner-image rollover
  # that might shift behaviour).
  pull_request:
    branches: [main]
    paths:
      - "src/backend/**"
      - ".github/workflows/backend-checks.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  # Coverage ratchet (was its own workflow; folded in here so all PR-time
  # backend checks live together). Floor measured ~58.5% (2026-06-13); set just
  # below baseline so it gates today and only ever ratchets upward.
  COVERAGE_MIN_LINES: "55"

jobs:
  check:
    name: Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend

    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/backend -> target

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features

      - name: Run tests
        run: cargo test --all

  dotnet-identity:
    name: .NET — Identity Service Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend/services/identity

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: NuGet cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('src/backend/services/identity/**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Insight.Identity.sln

      - name: Build
        run: dotnet build Insight.Identity.sln --no-restore --configuration Release

      - name: Unit tests
        run: >
          dotnet test tests/Insight.Identity.Tests.Unit/Insight.Identity.Tests.Unit.csproj
          --no-build --configuration Release

      - name: Integration tests (Testcontainers MariaDB)
        run: >
          dotnet test tests/Insight.Identity.Tests.Integration/Insight.Identity.Tests.Integration.csproj
          --no-build --configuration Release

  coverage-unit:
    name: coverage-unit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
      - run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable (pinned 2026-06)
        with:
          toolchain: 1.95.0
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2.7.5
        with:
          workspaces: src/backend
      - uses: taiki-e/install-action@375e0c7f08a66b8c2ba7e7eef31a6f91043a81b0 # v2.44.38
        with:
          tool: cargo-llvm-cov
      - name: Validate coverage floor is enforcing
        run: |
          [[ "$COVERAGE_MIN_LINES" =~ ^[0-9]+$ ]] || { echo "::error::COVERAGE_MIN_LINES must be numeric"; exit 1; }
          (( COVERAGE_MIN_LINES > 0 )) || { echo "::error::COVERAGE_MIN_LINES must be > 0 to gate"; exit 1; }
      - name: Instrumented unit coverage (exact lines, ratchet)
        working-directory: src/backend
        run: |
          cargo llvm-cov --all-features --workspace \
            --lcov --output-path target/coverage-unit.lcov \
            --fail-under-lines "$COVERAGE_MIN_LINES"
          cargo llvm-cov report --summary-only | tee -a "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: coverage-unit-lcov
          path: src/backend/target/coverage-unit.lcov
          if-no-files-found: error
