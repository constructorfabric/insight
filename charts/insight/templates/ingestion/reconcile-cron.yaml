{{- if .Values.ingestion.templates.enabled }}
{{- /* Argo CronWorkflow that drives the connector reconcile loop on schedule. */}}
apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: {{ include "insight.fullname" . }}-reconcile-loop
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: reconcile-loop
    {{- include "insight.labels" . | nindent 4 }}
spec:
  schedule: {{ required "ingestion.reconcile.schedule is required" .Values.ingestion.reconcile.schedule | quote }}
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  workflowSpec:
    serviceAccountName: {{ include "insight.fullname" . }}-reconcile
    entrypoint: run
    activeDeadlineSeconds: 1800
    {{- with .Values.global.imagePullSecrets }}
    imagePullSecrets:
      {{- toYaml . | nindent 6 }}
    {{- end }}
    volumes:
      - name: insight-reconcile-logs
        persistentVolumeClaim:
          claimName: {{ include "insight.fullname" . }}-reconcile-logs
    templates:
      - name: run
        container:
          image: {{ required "ingestion.toolboxImage is required when ingestion.templates.enabled=true" .Values.ingestion.toolboxImage | quote }}
          command: [bash]
          args:
            - "-c"
            - "bash /src/ingestion/reconcile-connectors/main.sh"
          env:
            - name: AIRBYTE_URL
              value: {{ include "insight.airbyte.url" . | quote }}
            - name: INSIGHT_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: INSIGHT_AIRBYTE_WORKSPACE_ID
              value: {{ required "ingestion.reconcile.airbyteWorkspaceId is required (the Airbyte workspace UUID where Insight connectors are managed)" .Values.ingestion.reconcile.airbyteWorkspaceId | quote }}
            - name: RECONCILE_DESTINATION_ID
              value: {{ required "ingestion.reconcile.destinationId is required (the Airbyte destination UUID for Insight Bronze; reconcile_connections needs it to bootstrap connections on a clean cluster)" .Values.ingestion.reconcile.destinationId | quote }}
            - name: INSIGHT_TENANT_ID
              value: {{ required "ingestion.reconcile.tenantId is required (the Insight tenant slug; used in source/connection names per ADR-0005)" .Values.ingestion.reconcile.tenantId | quote }}
            - name: IMAGE_REGISTRY
              value: {{ required "ingestion.reconcile.imageRegistry is required (e.g. ghcr.io/cyberfabric — derives CDK source dockerRepository per ADR-0011)" .Values.ingestion.reconcile.imageRegistry | quote }}
          resources:
            requests:
              cpu: {{ .Values.ingestion.reconcile.resources.requests.cpu | quote }}
              memory: {{ .Values.ingestion.reconcile.resources.requests.memory | quote }}
            limits:
              cpu: {{ .Values.ingestion.reconcile.resources.limits.cpu | quote }}
              memory: {{ .Values.ingestion.reconcile.resources.limits.memory | quote }}
          volumeMounts:
            - name: insight-reconcile-logs
              mountPath: /var/log/insight
{{- end }}
