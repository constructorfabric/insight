##
## Loki — log store for the bundled observability stack (LGTM, logs first).
##
## Reference values consumed by BOTH deployment paths (same model as
## deploy/argo/values.yaml):
##   - Local/dev     — deploy/scripts/install-observability.sh
##   - Cluster (ops) — infra/insight-gitops:system/loki/values.yaml (L2)
##
## Namespace-agnostic: the push/query endpoint name (`loki`) is the same
## in whatever namespace this is installed; consumers reference it as
## `loki.<namespace>.svc.cluster.local:3100`.
##
## SCOPE: dev / single-tenant baseline — SingleBinary, node-local
## filesystem, NO HA. Production: object storage (S3/GCS) + read/write/
## backend split + auth if one Loki serves more than one install.
##

deploymentMode: SingleBinary

loki:
  # Single install per cluster → no tenant header. Flip to true (+ set
  # X-Scope-OrgID on Alloy and the Grafana datasource) only if one Loki
  # ever serves multiple tenants/installs.
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: loki_index_
          period: 24h
  storage:
    type: filesystem
  limits_config:
    retention_period: 168h # 7d
    reject_old_samples: true
    reject_old_samples_max_age: 168h

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 10Gi

# SingleBinary covers all roles — disable the microservice split.
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

chunksCache:
  enabled: false
resultsCache:
  enabled: false

gateway:
  enabled: false

test:
  enabled: false
lokiCanary:
  enabled: false
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
