# Test users for the fake IdP. Checked in, test-only, no secrets.
#
# The first entry is the default returned by /authorize when no `user=<email>`
# query parameter is given. `sub` is the stable IdP subject; `sid` is the IdP
# session id echoed into id_tokens and back-channel logout_tokens. `tenants`
# are hints the downstream identity/authenticator flow may map from — the fake
# IdP just carries them so e2e fixtures have something to assert on.
users:
  - email: alice@example.com
    name: Alice Admin
    sub: fakeidp|alice
    sid: sid-alice-0001
    tenants:
      - 00000000-df51-5b42-9538-d2b56b7ee953

  - email: bob@example.com
    name: Bob Builder
    sub: fakeidp|bob
    sid: sid-bob-0001
    tenants:
      - 00000000-df51-5b42-9538-d2b56b7ee953

  - email: carol@example.com
    name: Carol Contractor
    sub: fakeidp|carol
    sid: sid-carol-0001
    tenants:
      - 11111111-df51-5b42-9538-d2b56b7ee953
      - 00000000-df51-5b42-9538-d2b56b7ee953
