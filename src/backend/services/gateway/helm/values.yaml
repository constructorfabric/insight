replicaCount: 1

podAnnotations: {}

image:
  repository: ghcr.io/constructorfabric/insight-gateway
  tag: "" # MUST be set by the operator. No `:latest` default.
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

# Deployment-specific settings, passed to the container as env vars; the
# entrypoint feeds them to routegen at startup (the route table itself is the
# mounted ConfigMap). Nothing is baked into the image.
gateway:
  # The gateway's upstreams, addressed by k8s service DNS. deployment.yaml
  # assembles the FQDN URL as http://<service>.<Release.Namespace>.svc.<clusterDomain>:<port>
  # (an FQDN is required -- the cosocket's DNS does not apply the search domain).
  clusterDomain: cluster.local
  authenticator:
    service: authenticator
    port: 8083
  front:
    service: insight-front
    port: 8080
  # Trusted ingress-hop CIDRs for X-Forwarded-For (set_real_ip_from). Empty =
  # no client-IP trust; set to the ingress/pod network where TLS terminates in
  # front of the gateway (G8).
  setRealIpFrom: []
  # lua_shared_dict exchange-cache size (empty = routegen default 64m).
  jwtCacheSize: ""

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 500m
    memory: 128Mi

# Liveness = static /healthz. Readiness = LOCAL only, deliberately NOT gated on
# the authenticator (DESIGN 3.15): coupling a caching proxy's readiness to a
# downstream dependency turns a transient auth blip into a fleet-wide outage.
# The authenticator dependency is surfaced separately at /healthz/authenticator
# for monitoring/alerting only, never the readiness gate.
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5
