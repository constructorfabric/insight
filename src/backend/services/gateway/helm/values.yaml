# At least 2 replicas: the gateway is on the path of all traffic, and the
# exchange cache is per pod (DESIGN 3.15).
replicaCount: 2

podAnnotations: {}

image:
  repository: ghcr.io/constructorfabric/insight-gateway
  tag: "" # MUST be set by the operator. No `:latest` default.
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

# Deployment-specific settings, passed to the container as env vars; the
# entrypoint feeds them to routegen at startup (the route table itself is the
# mounted ConfigMap). Nothing is baked into the image.
gateway:
  # Authenticator base URL for the /auth proxy and the Lua exchange cosocket.
  # Use the FQDN: the cosocket's DNS (lua-resty-http) does NOT apply the k8s
  # search domain, unlike nginx's own upstream resolution.
  authenticatorUrl: http://authenticator.insight.svc.cluster.local:8083
  # insight-front SPA server.
  frontUrl: http://insight-front.insight.svc.cluster.local:8080
  # kube-dns / CoreDNS cluster IP -- mandatory for the Lua cosocket (ADR-0001).
  # kubeadm defaults to 10.96.0.10; k3s uses 10.43.0.10.
  resolver: 10.96.0.10
  # Trusted ingress-hop CIDRs for X-Forwarded-For (set_real_ip_from). Empty =
  # no client-IP trust (safe default). Set to the ingress/pod network in
  # clusters that terminate TLS in front of the gateway (G8).
  setRealIpFrom: []
  # Optional: size of the lua_shared_dict exchange cache (routegen default 64m).
  jwtCacheSize: ""

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 500m
    memory: 128Mi

# Liveness = static /healthz. Readiness = LOCAL only, deliberately NOT gated on
# the authenticator (DESIGN 3.15): coupling a caching proxy's readiness to a
# downstream dependency turns a transient auth blip into a fleet-wide outage.
# The authenticator dependency is surfaced separately at /healthz/authenticator
# for monitoring/alerting only, never the readiness gate.
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 3
  periodSeconds: 5
