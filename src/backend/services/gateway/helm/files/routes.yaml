# Gateway route table -- the single operator-facing source of truth
# (gateway DESIGN 3.8). Shipped verbatim as a ConfigMap (see the chart) and
# mounted into the gateway container; the container runs routegen against it at
# startup to produce nginx.conf. A route change is a PR to this file, reviewable
# in gitops -- humans never write a `location` block.
#
# Upstream authorities use short service names, which resolve in both k8s
# (same-namespace search domain) and docker compose (embedded DNS), so this file
# is environment-agnostic. Deployment-specific settings (authenticator URL,
# front URL, DNS resolver, trusted proxy CIDRs) are NOT here -- they are passed
# to the container as environment variables.
version: 1
defaults:
  timeout_ms: 30000
  strip_prefix: false
  websocket: false
  # Operator-extensible deny-list. The gateway-reserved set (Authorization,
  # X-Correlation-Id, X-Forwarded-*, gateway cookies) is always stripped in
  # addition; X-Tenant-ID is NOT reserved and passes through as the tenant
  # selector the downstream middleware validates against the signed tenants[].
  strip_request_headers:
    - X-Real-IP
    - Forwarded
routes:
  - prefix: /api/v1/analytics
    upstream: http://analytics:8081
    timeout_ms: 60000

  - prefix: /api/v1/identity
    upstream: http://identity:8082
