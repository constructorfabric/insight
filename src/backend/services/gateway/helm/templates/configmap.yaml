{{- /*
  The reviewable route table, shipped verbatim from the committed routes.yaml
  (DD-GW-02). The gateway container compiles it into nginx.conf at startup via
  routegen; deployment-specific settings come from env (see deployment.yaml).
  Editing routes is a PR to this file -- reviewable in gitops.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "insight-gateway.fullname" . }}-routes
  labels:
    {{- include "insight-gateway.labels" . | nindent 4 }}
data:
  routes.yaml: |
{{ .Files.Get "files/routes.yaml" | indent 4 }}
