apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "insight-gateway.fullname" . }}
  labels:
    {{- include "insight-gateway.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "insight-gateway.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "insight-gateway.selectorLabels" . | nindent 8 }}
      annotations:
        # Reloader v1: roll the pods when the generated config changes (DESIGN
        # 3.13). A broken config never ships -- CI ran routegen + nginx -t.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.global }}
      {{- with .imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- end }}
      # No Docker-link env-vars; the gateway reaches everything by DNS.
      enableServiceLinks: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: gateway
          image: "{{ required "image.repository is required" .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # The Lua module ships in the image; only the generated nginx.conf is
          # mounted from the ConfigMap (DESIGN 3.15).
          volumeMounts:
            - name: nginx-config
              mountPath: /usr/local/openresty/nginx/conf/nginx.conf
              subPath: nginx.conf
              readOnly: true
            # Writable tmp for the pid file and nginx temp paths (the config
            # points them under /tmp); everything else is stateless (DESIGN 3.7).
            - name: tmp
              mountPath: /tmp
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "insight-gateway.fullname" . }}-nginx-config
        - name: tmp
          emptyDir: {}
