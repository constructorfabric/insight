[pytest]
# Standalone unit-test config for the reconcile-connectors Python toolbox.
# These are pure unit tests (no docker/ClickHouse/MariaDB): run them with
#   cd src/ingestion/reconcile-connectors/python && python -m pytest
# They are intentionally NOT part of the bronze-to-API e2e rig (tests/e2e)
# nor the coverage gate (ci.yml) -- see reconcile-connectors-unit.yml.
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
