spec_version: 1
description: >
  Metric: meeting_free, Zoom leg — IC Bullet Collaboration (…0012), PR #1746.
  The base Teams-only fixture is collab_meeting_free.test.yaml; this one proves
  Zoom activity CANCELS a meeting-free day.
  How it's computed (bronze → silver → gold):
    • bronze: daily Teams meeting report + Zoom participant sessions per person
    • silver: both sources deduped to per-person/day meeting durations
    • gold:   a DAY is "meeting-free" if a meeting row EXISTS that day but the
              total duration ACROSS BOTH SOURCES = 0 — so a zero-duration Teams
              day stops being meeting-free the moment the person sat in a Zoom
              meeting that day; the metric is the COUNT of such days over the
              window. value = the requested member's meeting-free day count;
              median/p25/p75/range = the distribution across the DEPARTMENT.

  Department: all 5 Engineering members get one zero-duration Teams row on
  2026-12-23 (a meeting-free-day candidate). erin ALSO has a 1h Zoom meeting on
  2026-12-23 → her day is NOT meeting-free. Counts {alice 1, bob 1, carol 1,
  dave 1, erin 0}; the IC case requests erin, so value = 0; the department of 5
  yields median 1, p25 1, p75 1, range [0,1] — if the Zoom leg were ignored the
  value would be 1 and range_min 0 would not occur.
  Cases: custom scope (single window over the department) · empty window.

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
    - $ref: templates/people.yaml#/templates/bob
    - $ref: templates/people.yaml#/templates/carol
    - $ref: templates/people.yaml#/templates/dave
    - $ref: templates/people.yaml#/templates/erin

  bronze_m365.teams_activity:
    # zero-duration Teams day for everyone → 5 meeting-free-day candidates
    - { $ref: templates/m365_teams.yaml#/templates/m365_teams, userPrincipalName: alice@example.com, reportRefreshDate: "2026-12-23", unique_key: mfz-alice-20261223, meetingsAttendedCount: 0, audioDuration: PT0S, videoDuration: PT0S, screenShareDuration: PT0S }
    - { $ref: templates/m365_teams.yaml#/templates/m365_teams, userPrincipalName: bob@example.com,   reportRefreshDate: "2026-12-23", unique_key: mfz-bob-20261223,   meetingsAttendedCount: 0, audioDuration: PT0S, videoDuration: PT0S, screenShareDuration: PT0S }
    - { $ref: templates/m365_teams.yaml#/templates/m365_teams, userPrincipalName: carol@example.com, reportRefreshDate: "2026-12-23", unique_key: mfz-carol-20261223, meetingsAttendedCount: 0, audioDuration: PT0S, videoDuration: PT0S, screenShareDuration: PT0S }
    - { $ref: templates/m365_teams.yaml#/templates/m365_teams, userPrincipalName: dave@example.com,  reportRefreshDate: "2026-12-23", unique_key: mfz-dave-20261223,  meetingsAttendedCount: 0, audioDuration: PT0S, videoDuration: PT0S, screenShareDuration: PT0S }
    - { $ref: templates/m365_teams.yaml#/templates/m365_teams, userPrincipalName: erin@example.com,  reportRefreshDate: "2026-12-23", unique_key: mfz-erin-20261223,  meetingsAttendedCount: 0, audioDuration: PT0S, videoDuration: PT0S, screenShareDuration: PT0S }

  bronze_zoom.participants:
    # erin's 1h Zoom meeting on the SAME day cancels her meeting-free day
    - { $ref: templates/zoom.yaml#/templates/erin_zoom, unique_key: mfz-z-erin-1, meeting_uuid: "mfz-e1==", participant_uuid: "mfz-e1-p1", join_time: "2026-12-23T15:00:00Z", leave_time: "2026-12-23T16:00:00Z" }

cases:
  # dept {1,1,1,1,0}; erin value 0. p25=1 median=1 p75=1 range=[0,1]
  - name: "meeting_free — Zoom activity cancels the meeting-free day (department of 5)"
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: collaboration
            metric_id: 00000000-0000-0000-0001-000000000012
            $filter: "person_id eq 'erin@example.com' and metric_date ge '2026-12-01' and metric_date le '2026-12-31'"
    expect:
      - assert: "status == 200"
      - in: collaboration
        assert: "result.status == 'ok'"
      - in: collaboration
        find: { metric_key: meeting_free }
        equal: { value: 0, median: 1, range_min: 0, range_max: 1, p25: 1, p75: 1 }

  # ── EMPTY window (no rows in range) ──────────────────────────────────────────
  - name: "meeting_free zoom leg — EMPTY window (no data → no items)"
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: collaboration
            metric_id: 00000000-0000-0000-0001-000000000012
            $filter: "person_id eq 'erin@example.com' and metric_date ge '2026-06-01' and metric_date le '2026-06-30'"
    expect:
      - assert: "status == 200"
      - in: collaboration
        assert: "result.status == 'ok'"
      - in: collaboration
        assert: "size(items) == 0"
