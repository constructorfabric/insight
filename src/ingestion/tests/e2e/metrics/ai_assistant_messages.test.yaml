spec_version: 1
description: >
  Metric: ai.assistant_messages.
  How it's computed (bronze → silver → gold):
    • bronze: ChatGPT daily per-user chat activity (message counts)
    • silver: deduped to one row per user/day carrying the chat-message count
    • gold:   metric = sum of ChatGPT chat messages over the window

  Team (median/range = the person's department):
    alice 40 · bob 20 · carol 10 (alice row re-synced once → must not double)
    → median 20, range [10, 40].

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
    - $ref: templates/people.yaml#/templates/bob
    - $ref: templates/people.yaml#/templates/carol
  bronze_chatgpt_team.chatgpt_team_chat_activity:
    - $ref: templates/chatgpt_team_chat.yaml#/templates/alice
      unique_key: chat-alice-20260105
      date: "2026-01-05"
      messages: 40
    - $ref: templates/chatgpt_team_chat.yaml#/templates/alice   # re-sync dup → must NOT double
      unique_key: chat-alice-20260105
      date: "2026-01-05"
      messages: 40
    - $ref: templates/chatgpt_team_chat.yaml#/templates/bob
      unique_key: chat-bob-20260105
      date: "2026-01-05"
      messages: 20
    - $ref: templates/chatgpt_team_chat.yaml#/templates/carol
      unique_key: chat-carol-20260105
      date: "2026-01-05"
      messages: 10

cases:
  - name: AI assistant messages
    request:
      url: /v1/metric-results
      method: POST
      body:
        entity: { type: person, ids: [alice@example.com] }
        period: { from: "2026-01-01", to: "2026-01-31" }
        metrics:
          - metric_key: ai.assistant_messages
            views:
              - { view: period }
              - { view: peer }
              - { view: timeseries, bucket: day }
              - { view: breakdown, dimensions: [tool, surface] }
    expect:
      - assert: "status == 200"
      - metric: ai.assistant_messages
        view: period
        find: { entity_id: alice@example.com }
        equal: { value: 40 }
      - metric: ai.assistant_messages
        view: peer
        find: { entity_id: alice@example.com }
        equal: { target_value: 40, p25: null, median: null, p75: null, min: null, max: null, n: 3 }
      - metric: ai.assistant_messages
        view: timeseries
        assert: "items.exists(s, s.entity_id == 'alice@example.com' && s.points.exists(p, p.bucket_start == '2026-01-05' && double(p.value) == 40.0))"
      - metric: ai.assistant_messages
        view: breakdown
        assert: "items.exists(v, v.entity_id == 'alice@example.com' && size(v.dimensions) == 2 && v.dimensions.exists(d, d.key == 'tool' && d.value == 'chatgpt') && v.dimensions.exists(d, d.key == 'surface' && d.value == 'chat') && double(v.value) == 40.0)"
