spec_version: 1
description: >
  Metrics: ai.accepted_edit_actions and ai.tool_acceptance_rate.
  How it's computed (bronze → silver → gold):
    • bronze: Claude Enterprise per-user/day usage (code tool suggestions accepted & rejected)
    • silver: class_ai_dev_usage (tool='claude_code'); one row per user/day; tool_use_accepted
              ← code_tool_accepted_count, tool_use_offered ← accepted + rejected
    • gold:   ai_bullet_rows branch 3 emits BOTH ('cc_tool_accept', accepted) and
              ('cc_offered', offered) per day. The served IC query reconstructs the
              ratio at serve time, per person, over the window:
                  value = round(100 × Σ cc_tool_accept ÷ Σ cc_offered, 1)
              (the only correct period aggregation when daily denominators differ).
              median/range_min/range_max are the DEPARTMENT distribution of those
              per-person windowed ratios.

  This fixture gives the metric the FULL treatment (value + median + range), not just
  `value`. The served IC query_ref (id …0013) is last re-seeded by migration
  m20260618_000001 (cc_overage) and carries value/median/range_min/range_max — NOT
  p25/p75/n. The no-unasserted-stat gate is self-scoping, so asserting those four
  satisfies it; p25/p75 are not returned and must not be asserted.

  user_id MUST be distinct per person (silver `LIMIT 1 BY tenant, source, user_id,
  date`) — a shared user_id would collapse the seats into one row.

  Department: 5 Engineering members with base acceptance b ∈ {5,10,15,20,25}.
  Each member has offered = 100 on every ring (uniform denominators), seeded inside
  the custom window (Nov 01 .. Dec 12): Nov 15 accepted = b+20, Dec 10 accepted = b+10.
  Windowed ratio = 100 × ((b+20)+(b+10)) / 200 = b+15, so the department ratios are
  {20,25,30,35,40}. The IC case requests erin (b=25) → value 40; the department of 5
  yields the median/range below. Cases: custom scope · empty window.

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
    - $ref: templates/people.yaml#/templates/bob
    - $ref: templates/people.yaml#/templates/carol
    - $ref: templates/people.yaml#/templates/dave
    - $ref: templates/people.yaml#/templates/erin

  bronze_claude_enterprise.claude_enterprise_users:
    # offered = accepted + rejected = 100 on every ring (uniform denominator).
    # Nov 15 accepted = b+20, Dec 10 accepted = b+10 → windowed ratio = b+15.
    # ── alice, b=5 ──────────────────────────────────────────────────────────────
    - { $ref: templates/claude_enterprise_users.yaml#/templates/alice, date: "2026-11-15", unique_key: ent-alice-20261115, code_tool_accepted_count: 25, code_tool_rejected_count: 75 }  # b+20
    - { $ref: templates/claude_enterprise_users.yaml#/templates/alice, date: "2026-12-10", unique_key: ent-alice-20261210, code_tool_accepted_count: 15, code_tool_rejected_count: 85 }  # b+10
    - { $ref: templates/claude_enterprise_users.yaml#/templates/alice, date: "2026-12-10", unique_key: ent-alice-20261210, code_tool_accepted_count: 15, code_tool_rejected_count: 85 }  # re-sync dup → ratio unchanged
    # ── bob, b=10 ───────────────────────────────────────────────────────────────
    - { $ref: templates/claude_enterprise_users.yaml#/templates/bob,   date: "2026-11-15", unique_key: ent-bob-20261115,   code_tool_accepted_count: 30, code_tool_rejected_count: 70 }  # b+20
    - { $ref: templates/claude_enterprise_users.yaml#/templates/bob,   date: "2026-12-10", unique_key: ent-bob-20261210,   code_tool_accepted_count: 20, code_tool_rejected_count: 80 }  # b+10
    # ── carol, b=15 ─────────────────────────────────────────────────────────────
    - { $ref: templates/claude_enterprise_users.yaml#/templates/carol, date: "2026-11-15", unique_key: ent-carol-20261115, code_tool_accepted_count: 35, code_tool_rejected_count: 65 }  # b+20
    - { $ref: templates/claude_enterprise_users.yaml#/templates/carol, date: "2026-12-10", unique_key: ent-carol-20261210, code_tool_accepted_count: 25, code_tool_rejected_count: 75 }  # b+10
    # ── dave, b=20 (user-dave) ──────────────────────────────────────────────────
    - { $ref: templates/claude_enterprise_users.yaml#/templates/ent_user, user_email: dave@example.com, user_id: user-dave, date: "2026-11-15", unique_key: ent-dave-20261115, code_tool_accepted_count: 40, code_tool_rejected_count: 60 }  # b+20
    - { $ref: templates/claude_enterprise_users.yaml#/templates/ent_user, user_email: dave@example.com, user_id: user-dave, date: "2026-12-10", unique_key: ent-dave-20261210, code_tool_accepted_count: 30, code_tool_rejected_count: 70 }  # b+10
    # ── erin, b=25 (user-erin; the requested IC member) ─────────────────────────
    - { $ref: templates/claude_enterprise_users.yaml#/templates/ent_user, user_email: erin@example.com, user_id: user-erin, date: "2026-11-15", unique_key: ent-erin-20261115, code_tool_accepted_count: 45, code_tool_rejected_count: 55 }  # b+20
    - { $ref: templates/claude_enterprise_users.yaml#/templates/ent_user, user_email: erin@example.com, user_id: user-erin, date: "2026-12-10", unique_key: ent-erin-20261210, code_tool_accepted_count: 35, code_tool_rejected_count: 65 }  # b+10

cases:
  # ── CUSTOM scope (Nov 01 .. Dec 12) — Nov 15 + Dec 10 rows ───────────────────
  # per-person ratio = b+15 → dept {20,25,30,35,40}; erin value 40.
  - name: AI accepted edits and acceptance rate
    request:
      url: /v1/metric-results
      method: POST
      body:
        entity: { type: person, ids: [erin@example.com] }
        period: { from: "2026-11-01", to: "2026-12-12" }
        metrics:
          - metric_key: ai.accepted_edit_actions
            views:
              - { view: period }
              - { view: peer }
              - { view: timeseries, bucket: day }
              - { view: breakdown, dimensions: [tool] }
          - metric_key: ai.tool_acceptance_rate
            views:
              - { view: period }
              - { view: peer }
              - { view: timeseries, bucket: day }
              - { view: breakdown, dimensions: [tool] }
    expect:
      - assert: "status == 200"
      - metric: ai.accepted_edit_actions
        view: period
        find: { entity_id: erin@example.com }
        equal: { value: 80 }
      - metric: ai.accepted_edit_actions
        view: peer
        find: { entity_id: erin@example.com }
        equal: { target_value: 80, p25: 50, median: 60, p75: 70, min: 40, max: 80, n: 5 }
      - metric: ai.accepted_edit_actions
        view: timeseries
        assert: "items.exists(s, s.entity_id == 'erin@example.com' && s.points.exists(p, p.bucket_start == '2026-11-15' && double(p.value) == 45.0) && s.points.exists(p, p.bucket_start == '2026-12-10' && double(p.value) == 35.0))"
      - metric: ai.accepted_edit_actions
        view: breakdown
        assert: "items.exists(v, v.entity_id == 'erin@example.com' && v.dimensions.exists(d, d.key == 'tool' && d.value == 'claude_code') && double(v.value) == 80.0)"
      - metric: ai.tool_acceptance_rate
        view: period
        find: { entity_id: erin@example.com }
        equal: { value: 40 }
      - metric: ai.tool_acceptance_rate
        view: peer
        find: { entity_id: erin@example.com }
        equal: { target_value: 40, p25: 25, median: 30, p75: 35, min: 20, max: 40, n: 5 }
      - metric: ai.tool_acceptance_rate
        view: timeseries
        assert: "items.exists(s, s.entity_id == 'erin@example.com' && s.points.exists(p, p.bucket_start == '2026-11-15' && double(p.value) == 45.0) && s.points.exists(p, p.bucket_start == '2026-12-10' && double(p.value) == 35.0))"
      - metric: ai.tool_acceptance_rate
        view: breakdown
        assert: "items.exists(v, v.entity_id == 'erin@example.com' && v.dimensions.exists(d, d.key == 'tool' && d.value == 'claude_code') && double(v.value) == 40.0)"

  # ── EMPTY window (no rows in range) ──────────────────────────────────────────
  - name: AI acceptance empty window
    request:
      url: /v1/metric-results
      method: POST
      body:
        entity: { type: person, ids: [erin@example.com] }
        period: { from: "2026-06-01", to: "2026-06-30" }
        metrics:
          - metric_key: ai.tool_acceptance_rate
            views:
              - { view: period }
    expect:
      - assert: "status == 200"
      - metric: ai.tool_acceptance_rate
        view: period
        find: { entity_id: erin@example.com }
        equal: { value: null }
