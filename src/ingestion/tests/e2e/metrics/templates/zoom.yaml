# Reusable Zoom records (bronze_zoom.participants + bronze_zoom.meetings).
# The base carries EVERY schema column (so a merged row is complete); the fields
# under test (join_time / leave_time / meeting_uuid / participant_uuid /
# unique_key) are set in each test's `bronze`. Meeting duration =
# dateDiff(join_time, leave_time); video is gated by `camera` (NULL/'' => 0) and
# screen-share by the share_* flags, so a participant with audio only contributes
# audio seconds as the longest modality.
#
# `unique_key` is the bronze row key (the table is RMT ORDER BY unique_key): give
# every DISTINCT seeded row a distinct unique_key; an Airbyte re-sync duplicate
# repeats the row verbatim (same unique_key).
#
# zoom_meeting rows feed session stitching (zoom__meeting_sessions): consecutive
# sessions (`uuid`) of the same Zoom Meeting ID (`id`) with an end→start gap
# ≤ 5 min collapse into one logical meeting. NOTE: the sessions model only reads
# bronze meetings whose `_airbyte_extracted_at` is within 90 days of REAL now()
# — override it per test to a date near the seeded meeting dates.
templates:
  zoom_participant:
    _airbyte_raw_id: "00000000-0000-0000-0000-000000000000"
    _airbyte_extracted_at: "2026-01-05T00:00:00"
    _airbyte_meta: "{}"
    _airbyte_generation_id: 0
    tenant_id: "00000000-0000-0000-0000-000000000000"
    source_id: "zoom-test"
    unique_key: null
    email: null
    user_name: null
    meeting_uuid: null
    participant_uuid: null
    join_time: null
    leave_time: null
    camera: null
    share_desktop: null
    share_application: null
    share_whiteboard: null
    video_connection_type: null

  zoom_meeting:
    _airbyte_raw_id: "00000000-0000-0000-0000-000000000000"
    _airbyte_extracted_at: "2026-01-05T00:00:00"
    _airbyte_meta: "{}"
    _airbyte_generation_id: 0
    tenant_id: "00000000-0000-0000-0000-000000000000"
    source_id: "zoom-test"
    unique_key: null
    id: null
    uuid: null
    start_time: null
    end_time: null
    has_video: false
    has_screen_share: false

  alice_zoom:
    $ref: "#/templates/zoom_participant"
    email: alice@example.com

  bob_zoom:
    $ref: "#/templates/zoom_participant"
    email: bob@example.com

  carol_zoom:
