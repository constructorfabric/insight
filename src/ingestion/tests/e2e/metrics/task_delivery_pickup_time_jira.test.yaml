spec_version: 1
description: >
  Task Delivery · pickup_time · JIRA, end-to-end from BRONZE only.

  Metric: pickup_time — IC Bullet Task Delivery (…0011). Days an issue waited
  (queue time) from creation until active work first started — i.e. until it
  first entered a DEV-active status.

  How it's computed (bronze → silver → gold):
    • bronze: one Jira issue (creation timestamp) + its status changelog.
    • silver: changelog → per-field event log → status intervals; the first
      dev-active interval's start is derived per issue.
    • gold:   per closed issue, pickup_seconds = created → first dev-active
      interval start (`task_dev_seconds_per_issue.pickup_seconds`) → days; the
      …0011 query_ref takes the period MEDIAN of those per-issue days.

  One issue (ALICE), all drivers inline; templates only carry invariant scaffolding.
  This scenario DELIBERATELY opens in a non-dev status ("Open") so pickup_time is
  non-zero (an issue created directly In Progress would pick up at 0 days):
    created 2026-01-05 09:00  status "Open"        (synthetic_initial)
    2026-01-07 09:00          → "In Progress"      (changelog, first dev status)
    2026-01-12 09:00          → "Closed"           (changelog, = final close)
  pickup_seconds = 2026-01-05 09:00 → 2026-01-07 09:00 = 2 d = 172800 s → 2.0 days.
  Median over Alice's one closed issue = 2.0.

  Only `value` is asserted (cohort median/range depend on unseeded HR org_unit).

bronze:
  bronze_jira.jira_issue:
    - $ref: templates/jira_task.yaml#/templates/jira_issue
      id: PU-1
      jira_id: PU-1
      unique_key: jira-test-PU-1
      id_readable: TSP-1
      created: "2026-01-05T09:00:00"
      custom_fields_json: '{"status":{"id":"6","name":"Closed"},"issuetype":{"id":"10001","name":"Task"},"assignee":{"accountId":"alice-jira-acct","displayName":"Alice Alpha"}}'
  bronze_jira.jira_issue_history:
    - $ref: templates/jira_task.yaml#/templates/jira_history
      id_readable: TSP-1
      changelog_id: "42001"
      unique_key: jira-test-TSP-1-42001
      created_at: "2026-01-07T09:00:00.000+0000"
      items: '[{"field":"Status","fieldId":"status","fromString":"Open","from":"1","toString":"In Progress","to":"3"}]'
    - $ref: templates/jira_task.yaml#/templates/jira_history
      id_readable: TSP-1
      changelog_id: "42002"
      unique_key: jira-test-TSP-1-42002
      created_at: "2026-01-12T09:00:00.000+0000"
      items: '[{"field":"Status","fieldId":"status","fromString":"In Progress","from":"3","toString":"Closed","to":"6"}]'
  bronze_jira.jira_fields:
    - $ref: templates/jira_task.yaml#/templates/field_status
    - $ref: templates/jira_task.yaml#/templates/field_assignee
    - $ref: templates/jira_task.yaml#/templates/field_issuetype
  bronze_jira.jira_user:
    - $ref: templates/jira_task.yaml#/templates/alice_user

cases:
  # IC Bullet Task Delivery (…0011): value = the requested person's own value.
  # Alice's single closed issue waited 2 days before first In Progress → pickup_time = 2.
  - name: pickup_time — IC bullet, jira (alice 2d queue before first dev status)
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: task_delivery
            metric_id: 00000000-0000-0000-0001-000000000011
            $top: 50
            $filter: "person_id eq 'alice@example.com' and metric_date ge '2026-01-01' and metric_date le '2026-01-31'"
            $orderby: metric_key
    expect:
      - assert: "status == 200"
      - in: task_delivery
        assert: "result.status == 'ok'"
      - in: task_delivery
        find: { metric_key: pickup_time }
        equal: { value: 2 }
