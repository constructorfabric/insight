spec_version: 1
description: >
  claude_web (Claude.ai Activity) — locked ComingSoon stub, hardcoded NULL in the
  AI bullet query_ref. Assert it stays NULL. Only the requested person is needed.

bronze:
  bronze_bamboohr.employees:
    - $ref: templates/people.yaml#/templates/alice
  bronze_cursor.cursor_daily_usage:
    # one cursor row so alice appears in ai_bullet_rows (the stub is null regardless).
    - $ref: templates/cursor_usage.yaml#/templates/alice
      unique_key: cursor-alice-20260105
      date: 1767571200000

cases:
  - name: claude_web — locked stub returns NULL
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: ai
            metric_id: 00000000-0000-0000-0001-000000000013
            $top: 50
            $filter: "person_id eq 'alice@example.com' and metric_date ge '2026-01-01' and metric_date le '2026-01-31'"
            $orderby: metric_key
    expect:
      - assert: "status == 200"
      - in: ai
        assert: "result.status == 'ok'"
      - in: ai
        find: { metric_key: claude_web }
        equal: { value: null }
