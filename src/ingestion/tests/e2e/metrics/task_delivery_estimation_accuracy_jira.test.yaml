spec_version: 1
description: >
  Task Delivery · estimation_accuracy · JIRA, end-to-end from BRONZE only.

  Metric: estimation_accuracy — IC Bullet Task Delivery (…0011). How close the
  original time estimate was to the time actually spent, folded symmetrically
  around 100% so under- and over-estimation are penalised equally.

  How it's computed (bronze → silver → gold):
    • bronze: one Jira issue whose changelog sets the time-tracking fields
      (timeoriginalestimate, timespent) and closes it. These fields arrive ONLY
      via the changelog — the issue snapshot never carries them.
    • silver: the changelog is reconstructed into a per-field event log; the
      latest estimate/spent per closed issue is derived.
    • gold:   per person-day, daily% = 100 · estimate / spent; the …0011
      query_ref folds it as greatest(0, 100 − avg(|100 − daily%|)) over days
      with 0 < daily% ≤ 200.

  One issue (ALICE), all drivers inline; templates only carry invariant scaffolding.
    created 2026-01-05 09:00  status "In Progress" (reconstructed)
    2026-01-12 09:00          status → "Closed", timeoriginalestimate → 28800 s
                              (8 h), timespent → 36000 s (10 h)  [one changelog]
  daily% = 100 · 28800 / 36000 = 80.0  →  estimation_accuracy = 100 − |100 − 80| = 80.0.

  Only `value` is asserted (cohort median/range depend on unseeded HR org_unit).

bronze:
  bronze_jira.jira_issue:
    - $ref: templates/jira_task.yaml#/templates/jira_issue
      id: EA-1
      jira_id: EA-1
      unique_key: jira-test-EA-1
      id_readable: TSE-1
      created: "2026-01-05T09:00:00"
      custom_fields_json: '{"status":{"id":"6","name":"Closed"},"issuetype":{"id":"10001","name":"Task"},"assignee":{"accountId":"alice-jira-acct","displayName":"Alice Alpha"}}'
  bronze_jira.jira_issue_history:
    # One changelog at close time carries three field changes: the close, the
    # original estimate (28800 s) and the time spent (36000 s).
    - $ref: templates/jira_task.yaml#/templates/jira_history
      id_readable: TSE-1
      changelog_id: "44001"
      unique_key: jira-test-TSE-1-44001
      created_at: "2026-01-12T09:00:00.000+0000"
      items: '[{"field":"Status","fieldId":"status","fromString":"In Progress","from":"3","toString":"Closed","to":"6"},{"field":"timeoriginalestimate","fieldId":"timeoriginalestimate","from":null,"fromString":null,"to":"28800","toString":"28800"},{"field":"timespent","fieldId":"timespent","from":null,"fromString":null,"to":"36000","toString":"36000"}]'
  bronze_jira.jira_fields:
    - $ref: templates/jira_task.yaml#/templates/field_status
    - $ref: templates/jira_task.yaml#/templates/field_assignee
    - $ref: templates/jira_task.yaml#/templates/field_issuetype
    - $ref: templates/jira_task.yaml#/templates/field_timeoriginalestimate
    - $ref: templates/jira_task.yaml#/templates/field_timespent
  bronze_jira.jira_user:
    - $ref: templates/jira_task.yaml#/templates/alice_user

cases:
  # IC Bullet Task Delivery (…0011): value = the requested person's own value.
  # Alice estimated 8h, spent 10h → daily% 80 → estimation_accuracy = 80.
  - name: estimation_accuracy — IC bullet, jira (alice est 8h / spent 10h = 80)
    request:
      url: /v1/metrics/queries
      method: POST
      body:
        queries:
          - id: task_delivery
            metric_id: 00000000-0000-0000-0001-000000000011
            $top: 50
            $filter: "person_id eq 'alice@example.com' and metric_date ge '2026-01-01' and metric_date le '2026-01-31'"
            $orderby: metric_key
    expect:
      - assert: "status == 200"
      - in: task_delivery
        assert: "result.status == 'ok'"
      - in: task_delivery
        find: { metric_key: estimation_accuracy }
        equal: { value: 80 }
