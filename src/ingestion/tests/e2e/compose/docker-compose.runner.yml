# Compose override: adds the `runner` service (python+rust+deps), and
# attaches CH+MariaDB to the same network without publishing ports — every
# component reaches the others via service names (clickhouse, mariadb).
#
# Used in tandem with docker-compose.yml. Activate via:
#   docker compose -f compose/docker-compose.yml -f compose/docker-compose.runner.yml ...
# (the wrapper script ../e2e.sh does this for you).

services:
  # Override: when running via the runner, we don't need host port-forwards.
  # Compose will keep the in-network endpoints (clickhouse:8123, mariadb:3306).
  clickhouse:
    ports: !reset []
  mariadb:
    ports: !reset []

  # Build-only helper: compiles the Jira enrich binary FROM ITS OWN Dockerfile
  # (the same one that ships the prod image — no build-recipe duplication). It is
  # never started; the runner consumes its image as a named build context (see
  # `runner.build.additional_contexts` below) and bakes the binary in.
  #
  # Adding another connector's enrich = one more service here + one
  # `additional_contexts` entry + one `COPY --from` line in Dockerfile.runner.
  jira-enrich:
    build:
      context: ${INSIGHT_REPO_ROOT:-../../../..}/src/ingestion/connectors/task-tracking/jira/enrich
      dockerfile: Dockerfile
    image: insight-e2e-enrich-jira:local

  # Build-only helper: compiles analytics FROM ITS OWN Dockerfile (same as the
  # prod image, build context src/backend). Consumed by the runner via
  # additional_contexts (COPY --from) and baked in — the runner no longer compiles
  # anything, so its image carries no Rust toolchain.
  analytics:
    build:
      context: ${INSIGHT_REPO_ROOT:-../../../..}/src/backend
      dockerfile: services/analytics/Dockerfile
    image: insight-e2e-analytics:local

  # Build-only helper: publishes the .NET identity service FROM ITS OWN
  # Dockerfile. The runner bakes the published app (COPY --from=identity) and
  # spawns it via the aspnetcore runtime — the identity contract suite
  # (identity/, #1753) treats it as the system-under-test.
  identity:
    build:
      context: ${INSIGHT_REPO_ROOT:-../../../..}/src/backend
      dockerfile: services/identity/Dockerfile
    image: insight-e2e-identity:local

  runner:
    build:
      # Resolved by ../e2e.sh; CI workflow also exports this. We use an
      # absolute path because compose resolves `context:` relative to the
      # project directory, not the file location.
      context: ${INSIGHT_REPO_ROOT:-../../../..}
      dockerfile: src/ingestion/tests/e2e/compose/Dockerfile.runner
      # Bake each connector's enrich binary into the runner image via a named
      # build context backed by the connector's own build-only service above.
      # `COPY --from=<name>` in Dockerfile.runner pulls the compiled binary.
      # NB: `docker-image://` refs, not `service:` refs — docker compose
      # v2.36 fails `compose run` on `service:` contexts ("no such service")
      # because run narrows the project to the target service. The images are
      # built by the SAME `compose build` invocation (e2e.sh builds the
      # build-only services together with the runner), so the refs resolve.
      additional_contexts:
        jira-enrich: "docker-image://insight-e2e-enrich-jira:local"
        analytics: "docker-image://insight-e2e-analytics:local"
        identity: "docker-image://insight-e2e-identity:local"
    image: insight-e2e-runner:latest
    container_name: insight-e2e-runner
    working_dir: /workspace/src/ingestion/tests/e2e
    depends_on:
      clickhouse:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    environment:
      # Service names on the insight-e2e network — overrides the localhost
      # defaults in lib/config.py. The session-rig honors these in
      # E2E_RUN_MODE=docker.
      E2E_RUN_MODE: docker
      E2E_CH_HOST: clickhouse
      E2E_CH_HTTP_PORT: "8123"
      E2E_MARIADB_HOST: mariadb
      E2E_MARIADB_PORT: "3306"
      # Credentials must match what compose.yml seeds via env_file.
      E2E_CH_USER: ${CLICKHOUSE_USER:-insight}
      E2E_CH_PASSWORD: ${CLICKHOUSE_PASSWORD}
      E2E_MARIADB_USER: ${MARIADB_USER:-insight}
      E2E_MARIADB_PASSWORD: ${MARIADB_PASSWORD}
      # Root creds: the identity suite provisions the service's own database
      # (CREATE DATABASE + GRANT — lib/identity.py) before spawning it.
      E2E_MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      # Which identity implementation the contract suite spawns (see
      # lib/identity.py). Forwarded from the caller's shell so
      # `E2E_IDENTITY_IMPLEMENTATION=rust ./e2e.sh test identity/` reaches
      # the harness inside the container.
      E2E_IDENTITY_IMPLEMENTATION: ${E2E_IDENTITY_IMPLEMENTATION:-dotnet}
      E2E_MARIADB_DATABASE: ${MARIADB_DATABASE:-analytics}
      RUST_BACKTRACE: "1"
    volumes:
      # Absolute path resolved by ../e2e.sh (and the CI workflow). Compose
      # resolves relative volume paths against the project dir, which is
      # the compose/ directory here — using ${INSIGHT_REPO_ROOT} sidesteps
      # the level-counting question entirely.
      - ${INSIGHT_REPO_ROOT}:/workspace
    networks:
      - insight-e2e
