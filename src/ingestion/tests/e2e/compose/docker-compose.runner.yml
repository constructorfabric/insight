# Compose override: adds ONLY the e2e `runner` container, layered on the
# repo-root docker-compose.yml.
#
# ClickHouse + MariaDB come from the ROOT stack — the runner attaches to them
# by service name on the root `insight` network (no host port-forwards needed).
# If a dev stack is already up (`./dev-compose.sh up`) the runner reuses it;
# otherwise its `depends_on` brings up clickhouse + mariadb as dependencies.
#
# The runner builds + spawns its OWN analytics-api from current source (that is
# the point of the harness) — it does NOT use the root stack's analytics-api.
#
# Always used WITH the root file and the local-{clickhouse,mariadb} profiles,
# sharing the SAME env file so credentials match a running dev stack:
#
#   docker compose --env-file <repo>/.env.compose \
#     -f docker-compose.yml \
#     -f src/ingestion/tests/e2e/compose/docker-compose.runner.yml \
#     --profile local-clickhouse --profile local-mariadb \
#     run --rm runner pytest
#
# The wrapper ../e2e.sh does all of this for you.

services:
  runner:
    build:
      # Resolved by ../e2e.sh; the CI workflow also exports this. Compose
      # resolves `context:` relative to the project directory (the repo root
      # here, since the root compose is the first -f), but the absolute
      # ${INSIGHT_REPO_ROOT} keeps it invariant to the invoking cwd.
      context: ${INSIGHT_REPO_ROOT:-../../../..}
      dockerfile: src/ingestion/tests/e2e/compose/Dockerfile.runner
    image: insight-e2e-runner:latest
    container_name: insight-e2e-runner
    working_dir: /workspace/src/ingestion/tests/e2e
    depends_on:
      clickhouse:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    environment:
      # Attach to the root stack's data tier by service name on the `insight`
      # network. Credentials + container ports come from the SAME env file the
      # root stack was started with, so they always match a running dev stack.
      E2E_RUN_MODE: docker
      E2E_CH_HOST: clickhouse
      E2E_CH_HTTP_PORT: "${CLICKHOUSE_INTERNAL_HTTP_PORT:-8123}"
      E2E_CH_USER: "${CLICKHOUSE_USER:-insight}"
      E2E_CH_PASSWORD: "${CLICKHOUSE_PASSWORD:-insight-local}"
      E2E_MARIADB_HOST: mariadb
      E2E_MARIADB_PORT: "${MARIADB_INTERNAL_PORT:-3306}"
      E2E_MARIADB_USER: "${MARIADB_USER:-insight}"
      E2E_MARIADB_PASSWORD: "${MARIADB_PASSWORD:-insight-local}"
      # The harness owns the `analytics` schema (its analytics-api runs SeaORM
      # migrations there). Root's mariadb-init.sql creates this database.
      E2E_MARIADB_DATABASE: analytics
      RUST_BACKTRACE: "1"
    volumes:
      # Absolute path resolved by ../e2e.sh (and the CI workflow).
      - ${INSIGHT_REPO_ROOT}:/workspace
      # Persistent caches across container restarts — first run cold-builds
      # cargo (3-5 min), subsequent runs are incremental (<30s).
      - cargo-cache:/usr/local/cargo/registry
      - cargo-target:/workspace/src/backend/target
    # Join the root stack's network so `clickhouse` / `mariadb` resolve.
    networks:
      - insight

volumes:
  cargo-cache:
  cargo-target:
