[pytest]
testpaths = metrics meta api
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
    --tb=short
markers =
    slow: tests that take > 5s
    offline: DB-free static/unit checks (meta/ guards) — need NO running stack; run in a plain-Python CI job, not the e2e stack
    smoke: framework tests that DO need the live stack (api/ + the dbt runner)
    metric: tests generated from metrics/*.test.yaml
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s | %(levelname)-7s | %(name)-20s | %(message)s
log_cli_date_format = %H:%M:%S
