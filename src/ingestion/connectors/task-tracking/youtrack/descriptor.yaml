name: youtrack
# 2.0.0: enriched added/removed in issue history, full issue links instead of
# trimmedIssues, color(id)+isResolved on field values. Strict-semver major so
# reconcile republishes the manifest and refreshes the connection sync_catalog
# (the frozen catalog predates the #620 normalizer fix). Requires a full
# re-pull of youtrack_issue_history to replace impoverished bronze payloads.
version: "2.0.0"

schedule: "0 3 * * *"
workflow: sync

# Silver routing (class_task_*) is delivered by the task-tracking Silver layer
# package, not by this connector. This PR ships Bronze source declarations in
# dbt/schema.yml only; the connector's dbt step is a deliberate no-op until
# DECOMPOSITION §2.5 (per-source staging projections tagged `silver:class_task_*`)
# lands. At that point flip dbt_select to `tag:youtrack`.
dbt_select: ""

connection:
  namespace: bronze_youtrack
