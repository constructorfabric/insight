name: github-v2
version: "2026.05.04"
type: cdk
schedule: "0 2 * * *"
workflow: sync
dbt_select: "tag:github+"

connection:
  namespace: "bronze_github"
secret:
  required_fields:
    - github_token
    - github_organizations
    - github_start_date
    - github_skip_archived
    - github_skip_forks
